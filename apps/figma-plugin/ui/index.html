<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Auto Bridge</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        background: linear-gradient(135deg, #f4f1e8 0%, #e9eef8 100%);
        color: #142033;
      }

      .panel {
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 10px 30px rgba(20, 32, 51, 0.12);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 16px;
      }

      p {
        margin: 0 0 12px;
        font-size: 12px;
        line-height: 1.5;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 8px 14px;
        background: #142033;
        color: white;
        cursor: pointer;
      }

      pre {
        margin: 12px 0 0;
        padding: 10px;
        border-radius: 10px;
        background: rgba(20, 32, 51, 0.08);
        overflow: auto;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Figma Auto Bridge</h1>
      <p id="status">Boot HTML loaded. Waiting for UI script...</p>
      <button id="reconnect" type="button">Reconnect</button>
      <pre id="details">If this message stays unchanged, Figma is still showing an old build or blocking UI script execution.</pre>
    </div>
    <script src="./ui.js"></script>
  </body>
</html>
